# Netlify configuration for AI Resume Optimizer

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  timeout = 26

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"
  functions = "netlify/functions"
  framework = "vite"

# Serverless functions live in /netlify/functions and are reachable at /.netlify/functions/<name>
# This redirect lets the frontend call /api/<name> as a cleaner alias.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — React Router handles client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible default headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
